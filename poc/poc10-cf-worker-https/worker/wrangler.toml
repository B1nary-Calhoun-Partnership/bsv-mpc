name = "poc10-mpc-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2024-12-01"
# account_id = "<your-cloudflare-account-id>"  # set via CLOUDFLARE_ACCOUNT_ID env or your own wrangler.toml override

[build]
command = "worker-build --release"

[[durable_objects.bindings]]
name = "MPC_STORAGE"
class_name = "MpcStorage"

[[migrations]]
tag = "v1"
new_classes = ["MpcStorage"]
