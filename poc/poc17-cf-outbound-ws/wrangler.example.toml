# Template wrangler.toml for poc17-cf-outbound-ws. Copy to
# `wrangler.toml` and fill in your CF `account_id` + secrets via
# `wrangler secret put`. The real `wrangler.toml` is gitignored per
# the workspace `.gitignore`.

name = "poc17-cf-outbound-ws"
main = "build/worker/shim.mjs"
compatibility_date = "2026-04-07"

# Set to your Cloudflare account id. The Calhoun dev account id is
# documented in `~/bsv/rust-message-box/wrangler.toml` (locally, this
# repo's wrangler.toml is gitignored — copy the value from there if
# you're on the Calhoun side).
account_id = "<your-cloudflare-account-id>"

[vars]
# Live Calhoun MessageBox relay (per `docs/PHASE-H-AUDIT.md`).
RELAY_URL = "https://rust-message-box.dev-a3e.workers.dev"

# Secrets (set via `wrangler secret put`):
#   SERVER_PRIVATE_KEY — 32-byte hex BRC-31 server identity. Per audit
#                        §11.5 (revised) the POC uses a one-shot priv,
#                        not a production key. Generate via:
#                          openssl rand -hex 32

[build]
command = "worker-build --release"

# H-3.5+: Durable Object binding for the per-cosigner session DO.
# The worker entry point reaches the DO via
# `env.durable_object("ENGINEIO_SESSION_DO")?.id_from_name("cosigner-test-1")?`.
# Per audit §11.1 the topology is per-identity — one DO per cosigner.
[[durable_objects.bindings]]
name = "ENGINEIO_SESSION_DO"
class_name = "EngineIoSessionDo"

[[migrations]]
tag = "v1"
new_classes = ["EngineIoSessionDo"]
