name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Opt into Node.js 24 for all JavaScript actions ahead of GitHub forcing
  # the switch on 2026-06-02 (Node 20 is removed entirely 2026-09-16). This
  # way any compat issue surfaces in CI now while we can fix it, not on
  # the day GH flips the default. Remove this env once it becomes the
  # default and we've verified everything still works.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: build + test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace --all-targets
      # Doctests are NOT included by --all-targets. Run them explicitly so
      # rustdoc examples don't silently rot — they were already broken for
      # anyhow::Result references in bsv-mpc-overlay until 2026-05-17.
      - run: cargo test --workspace --doc

  wasm:
    name: build + test (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
      # Phase G Step 5a: bsv-mpc-core compiles cleanly to wasm32. This is
      # the precondition for the future bsv-mpc-worker deployment using the
      # inline coordinators (G-4b/c/d). Existing audit §7.4 checkbox.
      - name: wasm32 build (bsv-mpc-core)
        run: cargo build -p bsv-mpc-core --target wasm32-unknown-unknown
      - name: wasm32 build (bsv-mpc-worker)
        run: cargo build -p bsv-mpc-worker --target wasm32-unknown-unknown
      # Phase G Step 5b: drive a 2-of-2 DKG end-to-end via the inline
      # `DkgCoordinator` on wasm32-unknown-unknown. Proves the *runtime*
      # (not just the build) of the inline rewrite — i.e. the SM driver
      # loop in dkg.rs executes correctly on wasm32. Audit §5.3 + §7.4.
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: wasm32 DKG runtime test (bsv-mpc-core)
        run: wasm-pack test --node -p bsv-mpc-core --test wasm32_dkg
